name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch dependency issues
    - cron: '0 0 * * 0'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov ruff pyright hypothesis beartype streamlit playwright bibtexparser requests habanero
    
    - name: Lint (ruff)
      run: ruff check --ignore N999 gin-sim tests/e2e/test_remote_app.py tests/unit/test_gin_sim_wrapper.py

    - name: Format check (ruff format)
      run: ruff format --check gin-sim tests/e2e/test_remote_app.py tests/unit/test_gin_sim_wrapper.py
    
    - name: Type check (pyright)
      run: pyright src/
    
    - name: Test with pytest
      run: pytest -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  validate-model:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest ruff pyright hypothesis beartype streamlit playwright bibtexparser requests habanero
    
    - name: Run stress tests
      run: python -m scripts.run_stress_tests
    
    - name: Run posterior predictive checks
      run: python -m scripts.run_posterior_predictive --n_draws 100
    
    - name: Validate references
      run: python -m scripts.validate_references --report
    
    - name: Upload validation reports
      uses: actions/upload-artifact@v4
      with:
        name: validation-reports
        path: outputs/

  build-docker:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t genetic-discrimination-model:${{ github.sha }} .
    
    - name: Test Docker image
      run: |
        docker run --rm genetic-discrimination-model:${{ github.sha }} \
          python -m scripts.run_stress_tests --n_draws 10
