name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  test:
    name: Test & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --locked --all-extras

    - name: Security Audit (pip-audit)
      run: uv run pip-audit

    - name: Lint (ruff)
      run: uv run ruff check .

    - name: Format check (ruff format)
      run: uv run ruff format --check .

    - name: Type check (pyright)
      run: uv run pyright src/

    - name: Test with pytest
      run: uv run pytest -v --cov=src --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false

  validate-research:
    name: Research Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --locked --all-extras

    - name: Run stress tests
      run: uv run python -m scripts.run_stress_tests

    - name: Validate references
      run: uv run python -m scripts.validate_references --report

    - name: Upload validation reports
      uses: actions/upload-artifact@v4
      with:
        name: research-validation-reports
        path: outputs/
