name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --locked --all-extras

    - name: Install dashboard runtime dependencies
      run: uv pip install -r streamlit_app/requirements.txt

    - name: Run Quality Gate
      run: uv run python scripts/quality_gate.py

    - name: Upload coverage.xml
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-${{ matrix.python-version }}
        path: coverage.xml

  test-broad:
    name: Broad Test Matrix (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --locked --all-extras

    - name: Install dashboard runtime dependencies
      run: uv pip install -r streamlit_app/requirements.txt

    - name: Run broad non-remote test suite
      run: uv run pytest --ignore=tests/e2e/test_remote_app.py --no-cov -q
