name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Diamond Standard Gate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --locked --all-extras

    - name: Install dashboard runtime dependencies
      run: uv pip install -r streamlit_app/requirements.txt

    - name: Run Pytest (Generate Coverage)
      run: uv run pytest -v --cov=src --cov-report=xml

    - name: Run Quality Gate
      run: uv run python scripts/quality_gate.py