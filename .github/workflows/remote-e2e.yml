name: Remote E2E Monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      GDPE_REMOTE_DASHBOARD_URL: https://ginsim.streamlit.app
      GDPE_REMOTE_DASHBOARD_TIMEOUT_MS: "420000"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Install dashboard runtime dependencies
        run: uv pip install -r streamlit_app/requirements.txt playwright pytest-playwright

      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium

      - name: Run Remote E2E Tests
        run: uv run pytest tests/e2e/test_remote_app.py -q --tb=short
