# Pre-commit configuration for research project
repos:
  # Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [src, streamlit_app, tests, gin-sim, scripts, noxfile.py]
      - id: ruff-format
        args: [--check, src, streamlit_app, tests, gin-sim, scripts, noxfile.py]

  # Security - Secret Scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: .*/tests/.*|.*\.ipynb

  # Structural Rigor - Conventional Commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.1.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=5000']

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.33.0
    hooks:
      - id: markdownlint
        args: [--disable, MD013]

  # Local validation hooks
  - repo: local
    hooks:
      - id: pyright
        name: Pyright (Core Source)
        entry: uv run pyright src
        language: system
        pass_filenames: false
      - id: bibtex-validator
        name: BibTeX Validator (Local)
        entry: python scripts/validate_bibtex.py context/references.bib
        language: system
        pass_filenames: false
        files: context/references.bib
  - repo: local
    hooks:
      - id: red-team-check
        name: Enforce Adversarial Red Teaming
        entry: python scripts/check_red_team.py
        language: system
        files: PHASE_.*_SUMMARY\.md
