# Pre-commit configuration for research project
# Focus: Reproducibility and research quality, not just code style

repos:
  # Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # YAML validation (configs)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        args: [--unsafe]  # Allow YAML anchors/aliases
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=5000']  # Warn if files >5MB added

  # Markdown linting (optional - uncomment if desired)
  # - repo: https://github.com/igorshubovych/markdownlint-cli
  #   rev: v0.33.0
  #   hooks:
  #     - id: markdownlint
  #       args: [--disable, MD013]  # Disable line-length for academic writing

  # BibTeX validation (research-specific)
  # - repo: https://github.com/jg-rp/bibtex-validator
  #   rev: v1.0.0
  #   hooks:
  #     - id: bibtex-validator
  #       files: context/references.bib

  # Note: Tests are run via CI/CD, not pre-commit
  # Run `pytest` manually before committing code changes
