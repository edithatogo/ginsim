# Calibration Targets and Prior Distributions
# Jurisdiction: Australia

---
# MODULE A: BEHAVIOUR / DETERRENCE
module_a_calibration:
  parameters:
    baseline_testing_uptake:
      prior:
        distribution: "Beta"
        parameters: {alpha: 462, beta: 426}
        mean: 0.52
        sd: 0.02
    deterrence_elasticity:
      sensitivity_bounds: {lower: 0.02, upper: 0.60}
      prior:
        distribution: "Beta"
        parameters: {alpha: 22.5, beta: 102.5}
        mean: 0.18
        sd: 0.035
    moratorium_effect:
      prior:
        distribution: "Beta"
        parameters: {alpha: 12, beta: 68}
        mean: 0.15
        sd: 0.04
  evppi_groupings:
    high_priority:
      params: [deterrence_elasticity, moratorium_effect]
      rationale: "Key policy drivers"
    medium_priority:
      params: [baseline_testing_uptake]
      rationale: "Well-estimated"

---
# MODULE C: INSURANCE EQUILIBRIUM
module_c_calibration:
  parameters:
    adverse_selection_elasticity:
      prior:
        distribution: "Normal"
        parameters: {mean: 0.08, sd: 0.04}
    demand_elasticity_high_risk:
      prior:
        distribution: "Normal"
        parameters: {mean: -0.22, sd: 0.08}
    baseline_loading:
      prior:
        distribution: "Normal"
        parameters: {mean: 0.15, sd: 0.06}
  evppi_groupings:
    high_priority:
      params: [adverse_selection_elasticity, demand_elasticity_high_risk]
      rationale: "Structural parameters"
