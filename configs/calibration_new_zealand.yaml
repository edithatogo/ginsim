# Calibration Targets and Prior Distributions
# Track: gdpe_0002_evidence_anchoring - Phase 2
# Last updated: 2026-03-03
# Jurisdiction: New Zealand

---
# =============================================================================
# NOTES: NZ EVIDENCE CONTEXT
# =============================================================================
#
# New Zealand has an extremely weak evidence base:
# - 0 quantitative studies on genetic discrimination and insurance
# - 1 HRC Inquiry report (2020) with qualitative submissions
# - All evidence graded as "Very Low" quality
#
# Approach:
# - Adapt Australian priors with wider variances
# - Use NZ-specific adjustments where HRC evidence exists
# - Acknowledge fundamental uncertainty in all parameters
#
# =============================================================================

# =============================================================================
# MODULE A: BEHAVIOUR / DETERRENCE
# =============================================================================

module_a_calibration_nz:
  description: |
    Calibration targets for NZ genetic testing behaviour.
    NOTE: All evidence adapted from international studies with NZ adjustments.

  parameters:
    # Baseline testing uptake (assumed similar to AU)
    baseline_testing_uptake:
      calibration_target:
        value: 0.52
        source: "ettema_genetic_testing_uptake_2021 (extrapolated)"
        jurisdiction: "Netherlands (applied to NZ)"
        notes: "No NZ-specific data; assume similar to developed health systems"
        uncertainty: "Wide uncertainty due to extrapolation"

      prior:
        distribution: "Beta"
        parameters:
          alpha: 416
          beta: 384
        mean: 0.52
        sd: 0.035
        rationale: |
          Same mean as AU but wider SD (×1.75) to reflect:
          - Different health system structure
          - Smaller private insurance market
          - ACC scheme may affect baseline

    # Deterrence elasticity (adapted from US with NZ adjustment)
    deterrence_elasticity:
      calibration_target:
        value: 0.12
        source: "hrc_nz_genetic_discrimination_2020 + mcguire_perceived_discrimination_testing_2019"
        jurisdiction: "NZ (HRC) + US (quantitative)"
        notes: "HRC Inquiry suggests lower concerns than US; ACC may reduce insurance worries"
        uncertainty: "Very wide: 0.05-0.25"

      prior:
        distribution: "Beta"
        parameters:
          alpha: 15
          beta: 110
        mean: 0.12
        sd: 0.03
        rationale: |
          Lower mean than AU (0.18) based on HRC submissions suggesting less deterrence.
          Wider SD reflects:
          - No quantitative NZ evidence
          - ACC scheme may reduce insurance concerns
          - Smaller private insurance market

    # Moratorium effect (informal in NZ)
    moratorium_effect:
      calibration_target:
        value: 0.10
        source: "hrc_nz_genetic_discrimination_2020"
        jurisdiction: "New Zealand"
        notes: "Informal adoption of AU FSC moratorium; no formal NZ policy"
        uncertainty: "Extremely wide: 0.02-0.25"

      prior:
        distribution: "Beta"
        parameters:
          alpha: 8
          beta: 72
        mean: 0.10
        sd: 0.035
        rationale: |
          Lower mean than AU (0.15) because:
          - No formal moratorium (informal industry practice only)
          - Smaller market → less impact
          Very wide SD reflects extreme uncertainty.

  # EVPPI groupings
  evppi_groupings:
    very_high_priority:
      - deterrence_elasticity
      - moratorium_effect
      rationale: "Critical uncertainties; no NZ evidence; major policy drivers"

---
# =============================================================================
# MODULE C: INSURANCE EQUILIBRIUM
# =============================================================================

module_c_calibration_nz:
  description: |
    Calibration targets for NZ insurance market equilibrium.
    NOTE: NZ market highly concentrated (top 4: ~75%); mostly Australian-owned.

  parameters:
    # Adverse selection elasticity (adapted with NZ market structure)
    adverse_selection_elasticity:
      calibration_target:
        value: 0.06
        source: "hersch_viscusi_insurance_discrimination_2019 (adapted for NZ)"
        jurisdiction: "US model applied to NZ"
        notes: "Lower than AU due to higher market concentration"
        uncertainty: "Very wide: 0.02-0.12"

      prior:
        distribution: "Normal"
        parameters:
          mean: 0.06
          sd: 0.035
        truncation:
          lower: 0
          upper: null
        rationale: |
          Lower mean than AU (0.08) because:
          - Higher market concentration may reduce adverse selection
          - Smaller market → less information asymmetry
          Wider SD reflects structural uncertainty.

    # Demand elasticity (no NZ-specific data)
    demand_elasticity_high_risk:
      calibration_target:
        value: -0.22
        source: "armstrong_genetic_testing_insurance_2020 (extrapolated)"
        jurisdiction: "United States (applied to NZ)"
        notes: "Assume similar to AU; no NZ data"
        uncertainty: "Very wide: -0.40 to -0.05"

      prior:
        distribution: "Normal"
        parameters:
          mean: -0.22
          sd: 0.10
        truncation:
          lower: null
          upper: 0
        rationale: |
          Same mean as AU but wider SD (×1.25) to reflect:
          - No NZ empirical evidence
          - Different market dynamics
          - ACC may affect demand responses

    # Baseline loading (informal in NZ)
    baseline_loading:
      calibration_target:
        value: 0.12
        source: "hrc_nz_genetic_discrimination_2020 + fsc_moratorium_2019"
        jurisdiction: "New Zealand (informal)"
        notes: "Informal adoption of AU caps; no formal NZ loading data"
        uncertainty: "Extremely wide: 0.05-0.25"

      prior:
        distribution: "Normal"
        parameters:
          mean: 0.12
          sd: 0.06
        truncation:
          lower: 0
          upper: null
        rationale: |
          Slightly lower mean than AU (0.15) because:
          - Informal practice (not formal policy)
          - Smaller market may have less loading
          Same SD as AU (high uncertainty).

  # EVPPI groupings
  evppi_groupings:
    very_high_priority:
      - adverse_selection_elasticity
      - demand_elasticity_high_risk
      rationale: "No NZ evidence; structural parameters; major uncertainty"

---
# =============================================================================
# MODULES D-F: ADAPTED FROM AUSTRALIA
# =============================================================================

module_d_calibration_nz:
  description: |
    Proxy substitution parameters for NZ.
    All parameters adapted from AU with wider variances.

  parameters:
    family_history_sensitivity:
      calibration_target:
        value: 0.68
        source: "tabor_family_history_proxy_2018 (extrapolated)"
        jurisdiction: "US (applied to NZ)"

      prior:
        distribution: "Beta"
        parameters:
          alpha: 320
          beta: 150
        mean: 0.68
        sd: 0.04
        rationale: "Same mean as AU; slightly wider SD (×1.33)"

    proxy_substitution_rate:
      calibration_target:
        value: 0.40
        source: "lowenstein_genetic_discrimination_insurance_2021 (extrapolated)"
        jurisdiction: "Multiple (applied to NZ)"

      prior:
        distribution: "Beta"
        parameters:
          alpha: 16
          beta: 24
        mean: 0.40
        sd: 0.11
        rationale: "Same mean as AU; slightly wider SD to reflect NZ uncertainty"

module_e_calibration_nz:
  description: |
    Pass-through parameters for NZ.
    Higher market concentration may affect pass-through.

  parameters:
    pass_through_rate:
      calibration_target:
        value: 0.70
        source: "finkelstein_insurance_market_structure_2019 (adapted)"
        jurisdiction: "US (adapted for NZ concentration)"

      prior:
        distribution: "Beta"
        parameters:
          alpha: 49
          beta: 21
        mean: 0.70
        sd: 0.06
        rationale: |
          Lower mean than AU (0.75) because:
          - Higher concentration may reduce pass-through
          Wider SD reflects market structure uncertainty.

module_f_calibration_nz:
  description: |
    Data quality externality parameters for NZ.
    Smaller research infrastructure may amplify effects.

  parameters:
    research_participation_elasticity:
      calibration_target:
        value: -0.10
        source: "blevins_genomic_data_bias_2020 (extrapolated)"
        jurisdiction: "International (applied to NZ)"

      prior:
        distribution: "Normal"
        parameters:
          mean: -0.10
          sd: 0.04
        truncation:
          lower: null
          upper: 0
        rationale: |
          Same mean as AU; wider SD (×1.33) because:
          - Smaller research infrastructure
          - May have larger proportional impact

---
# =============================================================================
# ENFORCEMENT AND COMPLIANCE
# =============================================================================

enforcement_calibration_nz:
  description: |
    Enforcement parameters for NZ.
    HRC complaints process; very low complaint numbers.

  parameters:
    # Enforcement effectiveness (HRC process)
    enforcement_effectiveness:
      calibration_target:
        value: 0.40
        source: "hrc_nz_genetic_discrimination_2020"
        jurisdiction: "New Zealand"
        notes: "HRC complaints process; ~2 complaints/year"
        uncertainty: "Extremely wide: 0.15-0.70"

      prior:
        distribution: "Beta"
        parameters:
          alpha: 8
          beta: 12
        mean: 0.40
        sd: 0.14
        rationale: |
          Lower mean than AU (0.50) because:
          - No formal genetic discrimination policy
          - General HRC process (not specific)
          - Very low complaint numbers
          Wide SD reflects extreme uncertainty.

    # Complaint rate
    complaint_rate:
      calibration_target:
        value: 0.01
        source: "hrc_nz_genetic_discrimination_2020"
        jurisdiction: "New Zealand"
        notes: "~2 complaints per year; ~200 genetic tests/year → ~0.01"
        uncertainty: "Extremely wide: 0.002-0.03"

      prior:
        distribution: "Beta"
        parameters:
          alpha: 1.5
          beta: 148.5
        mean: 0.01
        sd: 0.008
        rationale: |
          Lower than AU (0.02) based on HRC data.
          Wide SD reflects under-reporting uncertainty.

  # EVPPI groupings
  evppi_groupings:
    very_high_priority:
      - enforcement_effectiveness
      rationale: "Highest uncertainty; no formal policy; critical for effectiveness"

