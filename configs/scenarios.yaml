# Scenario Definitions for Genetic Discrimination Policy Analysis
# 
# This file defines standardized policy scenarios for comparative analysis.
# Each scenario specifies parameter values for different policy regimes.

scenarios:
  # ========================================================================
  # AUSTRALIA 2025 SCENARIOS
  # ========================================================================
  
  au_2025_ban:
    name: "Australia 2025 Genetic Ban"
    description: "Complete ban on use of genetic test results in life insurance"
    jurisdiction: "AU"
    parameters:
      baseline_testing_uptake: 0.52
      deterrence_elasticity: 0.08  # Reduced deterrence under ban
      moratorium_effect: 0.0  # No moratorium effect (replaced by ban)
      enforcement_strength: 0.9  # Strong enforcement
      penalty_rate: 0.8  # High penalties for violations
    expected_outcomes:
      testing_uptake_increase: 0.18  # +18% vs status quo
      welfare_impact: "Positive for high-risk individuals"
      
  au_fsc_moratorium:
    name: "FSC Moratorium (Australia)"
    description: "Financial Services Council moratorium on genetic discrimination"
    jurisdiction: "AU"
    parameters:
      baseline_testing_uptake: 0.52
      deterrence_elasticity: 0.12  # Moderate deterrence reduction
      moratorium_effect: 0.15  # Moratorium-specific boost
      enforcement_strength: 0.6  # Industry self-enforcement
      penalty_rate: 0.4  # Moderate penalties
    expected_outcomes:
      testing_uptake_increase: 0.12  # +12% vs status quo
      welfare_impact: "Moderate positive"
      
  au_status_quo:
    name: "Australia Status Quo"
    description: "Current Australian policy framework (pre-2025)"
    jurisdiction: "AU"
    parameters:
      baseline_testing_uptake: 0.52
      deterrence_elasticity: 0.18  # Baseline deterrence
      moratorium_effect: 0.0  # No additional effect
      enforcement_strength: 0.5  # Baseline enforcement
      penalty_rate: 0.3  # Baseline penalties
    expected_outcomes:
      testing_uptake_increase: 0.0  # Baseline
      welfare_impact: "Baseline"

  # ========================================================================
  # NEW ZEALAND SCENARIOS
  # ========================================================================
  
  nz_current:
    name: "New Zealand Current Policy"
    description: "Current NZ approach to genetic discrimination"
    jurisdiction: "NZ"
    parameters:
      baseline_testing_uptake: 0.48  # Slightly lower baseline
      deterrence_elasticity: 0.15
      moratorium_effect: 0.0
      enforcement_strength: 0.7
      penalty_rate: 0.5
    expected_outcomes:
      testing_uptake_increase: 0.0
      welfare_impact: "Baseline for NZ"

  # ========================================================================
  # INTERNATIONAL BENCHMARKS
  # ========================================================================
  
  usa_gina:
    name: "USA GINA (Health Only)"
    description: "Genetic Information Nondiscrimination Act - health insurance/employment only"
    jurisdiction: "US"
    parameters:
      baseline_testing_uptake: 0.55  # Higher baseline (different healthcare system)
      deterrence_elasticity: 0.10  # Reduced for health insurance
      moratorium_effect: 0.0
      enforcement_strength: 0.8  # Strong federal enforcement
      penalty_rate: 0.7
      note: "Does NOT cover life insurance - gap in protection"
    expected_outcomes:
      testing_uptake_increase: 0.08  # Limited to health insurance
      welfare_impact: "Positive for health insurance, neutral for life"
      
  uk_code:
    name: "UK Code on Genetic Testing"
    description: "Voluntary code with Huntington's disease exception"
    jurisdiction: "UK"
    parameters:
      baseline_testing_uptake: 0.50
      deterrence_elasticity: 0.14
      moratorium_effect: 0.10
      enforcement_strength: 0.65  # Industry self-regulation
      penalty_rate: 0.5
      note: "High-cap Huntington's disease can be used for policies >£500k"
    expected_outcomes:
      testing_uptake_increase: 0.10
      welfare_impact: "Moderate positive with exceptions"
      
  canada_gnda:
    name: "Canada GNDA"
    description: "Genetic Non-Discrimination Act - criminal prohibition"
    jurisdiction: "CA"
    parameters:
      baseline_testing_uptake: 0.53
      deterrence_elasticity: 0.06  # Very low deterrence (criminal penalties)
      moratorium_effect: 0.0
      enforcement_strength: 0.95  # Criminal law enforcement
      penalty_rate: 0.9  # Very high (criminal penalties)
      note: "Strongest protection - criminal offense to require genetic testing"
    expected_outcomes:
      testing_uptake_increase: 0.20
      welfare_impact: "Strongly positive"

  # ========================================================================
  # POLICY SANDBOX - CUSTOM SCENARIOS
  # ========================================================================
  
  sandbox_strong_enforcement:
    name: "Strong Enforcement Scenario"
    description: "High enforcement with moderate penalties"
    jurisdiction: "AU"
    parameters:
      baseline_testing_uptake: 0.52
      deterrence_elasticity: 0.10
      moratorium_effect: 0.15
      enforcement_strength: 0.9
      penalty_rate: 0.6
    expected_outcomes:
      testing_uptake_increase: 0.15
      welfare_impact: "Positive"
      
  sandbox_weak_enforcement:
    name: "Weak Enforcement Scenario"
    description: "Low enforcement with low penalties"
    jurisdiction: "AU"
    parameters:
      baseline_testing_uptake: 0.52
      deterrence_elasticity: 0.16
      moratorium_effect: 0.10
      enforcement_strength: 0.3
      penalty_rate: 0.2
    expected_outcomes:
      testing_uptake_increase: 0.05
      welfare_impact: "Marginally positive"

# Metadata
metadata:
  version: "1.0"
  last_updated: "2026-03-05"
  source: "Authors' analysis based on policy documents"
  notes: >
    Parameter values are illustrative and should be calibrated to empirical data.
    See context/jurisdiction_profiles/ for evidence sources.
