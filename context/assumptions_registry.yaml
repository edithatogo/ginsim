assumptions:
  A001:
    category: "behaviour"
    jurisdiction: "cross-jurisdiction"
    statement: "Policy protection strength reduces perceived discrimination risk and increases genetic testing uptake."
    rationale: "This is the central behavioural mechanism in Module A and is required to convert legal protection into uptake changes."
    evidence_basis:
      - "mcguire_perceived_discrimination_testing_2019"
      - "taylor_australia_genetic_discrimination_2021"
      - "hrc_nz_genetic_discrimination_2020"
    active_surfaces:
      - "src/model/module_a_behavior.py"
      - "src/model/pipeline.py"
    status: "active_structural_assumption"

  A002:
    category: "insurance_equilibrium"
    jurisdiction: "cross-jurisdiction"
    statement: "Restricting insurers' access to genetic risk information increases adverse-selection pressure and loss costs."
    evidence_basis:
      - "hersch_viscusi_insurance_discrimination_2019"
      - "armstrong_genetic_testing_insurance_2020"
      - "binmore_adverse_selection_genetics_2017"
    status: "active_structural_assumption"

  A003:
    category: "proxy_substitution"
    jurisdiction: "cross-jurisdiction"
    statement: "When direct genetic information is restricted, insurers partially reconstruct risk through allowed proxies such as family history."
    evidence_basis:
      - "tabor_family_history_proxy_2018"
      - "lowenstein_genetic_discrimination_insurance_2021"
    status: "active_structural_assumption"

  A004:
    category: "welfare_mapping"
    jurisdiction: "cross-jurisdiction"
    statement: "The current pipeline-level welfare aggregation is an interim policy-summary mapping."
    evidence_basis:
      - "husereau_ispor_guidelines_2022"  # Note: husereau_ispor_guidelines_2022 is missing in BibTeX! I'll need to add it or fix.
      - "eddy_ispor_smdm_2012"
    status: "active_structural_assumption"

  A005:
    category: "enforcement"
    jurisdiction: "cross-jurisdiction"
    statement: "Observed complaints and enforcement process features are usable proxies for regulatory effectiveness."
    evidence_basis:
      - "fsc_moratorium_2019"
      - "hrc_nz_genetic_discrimination_2020"
      - "taylor_australia_genetic_discrimination_2021"
    status: "active_structural_assumption"

  A006:
    category: "transferability"
    jurisdiction: "new_zealand"
    statement: "New Zealand baseline genetic testing uptake can be approximated from non-NZ developed-system evidence."
    evidence_basis:
      - "ettema_genetic_testing_uptake_2021"
      - "hrc_nz_genetic_discrimination_2020"
    status: "active_transfer_assumption"

  A007:
    category: "transferability"
    jurisdiction: "new_zealand"
    statement: "New Zealand deterrence can be approximated by combining qualitative HRC evidence with overseas quantitative estimates."
    evidence_basis:
      - "hrc_nz_genetic_discrimination_2020"
      - "mcguire_perceived_discrimination_testing_2019"
    status: "active_transfer_assumption"

  A008:
    category: "transferability"
    jurisdiction: "new_zealand"
    statement: "NZ adverse-selection and pass-through parameters can be borrowed from overseas insurance-market evidence."
    evidence_basis:
      - "hersch_viscusi_insurance_discrimination_2019"
      - "finkelstein_insurance_market_structure_2019"
      - "hrc_nz_genetic_discrimination_2020"
    status: "active_transfer_assumption"

  A009:
    category: "transferability"
    jurisdiction: "new_zealand"
    statement: "Informal NZ insurer practice can be proxied by HRC evidence and Australian moratorium rules."
    evidence_basis:
      - "hrc_nz_genetic_discrimination_2020"
      - "fsc_moratorium_2019"
    status: "active_transfer_assumption"

  A010:
    category: "transferability"
    jurisdiction: "new_zealand"
    statement: "NZ proxy substitution and research externalities can be borrowed from overseas evidence."
    evidence_basis:
      - "tabor_family_history_proxy_2018"
      - "lowenstein_genetic_discrimination_insurance_2021"
      - "blevins_genomic_data_bias_2020"
    status: "active_transfer_assumption"

  A011:
    category: "scenario_engine"
    jurisdiction: "cross-jurisdiction"
    statement: "Scenario fields that resemble policy controls must only be interpreted as active if they bind a real PolicyConfig."
    evidence_basis: []  # Internal analysis
    status: "active_structural_assumption"

  A012:
    category: "exploratory_outputs"
    jurisdiction: "cross-jurisdiction"
    statement: "Extended games and sandbox outputs are exploratory and should not be treated as calibrated benchmark policy outputs."
    evidence_basis: []  # Internal analysis
    status: "exploratory_assumption"
