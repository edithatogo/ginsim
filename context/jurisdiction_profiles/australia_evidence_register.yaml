# =============================================================================
# ENFORCEMENT AND COMPLIANCE
# =============================================================================

enforcement_compliance:
  description: |
    Evidence on enforcement mechanisms, compliance rates, and penalties
    for genetic discrimination violations.

  evidence_items:
    - evidence_id: "AU_enf_001"
      parameter: "enforcement_effectiveness"
      citation: "fsc_moratorium_2019"
      study_design: "Policy document"
      jurisdiction: "Australia"
      population: "FSC member insurers"
      sample_size: null

      # Quality assessment
      initial_grade: "E"  # Policy document
      directness: "Direct"
      precision: "Low"
      consistency: "Unknown"
      risk_of_bias: "High"
      final_grade: "Very Low"

      # Effect estimate (qualitative)
      point_estimate: 0.50
      confidence_interval_lower: 0.20
      confidence_interval_upper: 0.80
      measure_type: "Estimated compliance rate with FSC moratorium"

      # Prior conversion
      prior_distribution: "Beta"
      prior_alpha: 10
      prior_beta: 10
      prior_rationale: |
        Very low quality evidence.
        Uninformative prior reflects high uncertainty.

      notes: |
        FSC has limited enforcement power.
        Non-members not bound by moratorium.
        Key uncertainty for policy effectiveness.

    - evidence_id: "AU_enf_002"
      parameter: "complaint_rate"
      citation: "taylor_australia_genetic_discrimination_2021"
      study_design: "Case series"
      jurisdiction: "Australia"
      population: "Reported discrimination cases"
      sample_size: 12

      # Quality assessment
      initial_grade: "E"  # Case series
      directness: "Direct"
      precision: "Very Low"
      consistency: "Unknown"
      risk_of_bias: "High"
      final_grade: "Very Low"

      # Effect estimate
      point_estimate: 0.02
      confidence_interval_lower: 0.005
      confidence_interval_upper: 0.05
      measure_type: "Complaints per 100 genetic tests"

      # Prior conversion
      prior_distribution: "Beta"
      prior_alpha: 2
      prior_beta: 98
      prior_rationale: |
        Very low quality evidence.
        Likely under-reporting.

      notes: |
        Low observed complaints may reflect under-reporting.
        True discrimination rate uncertain.

  # Synthesis for Enforcement
  synthesis:
    enforcement_effectiveness:
      point: 0.50
      prior: "Beta(10, 10)"
      source: "fsc_moratorium_2019"

    complaint_rate:
      point: 0.02
      prior: "Beta(2, 98)"
      source: "taylor_australia_genetic_discrimination_2021"

    evidence_gaps:
      - "No systematic monitoring of moratorium compliance"
      - "Under-reporting of discrimination likely"
      - "Enforcement mechanisms weak (industry self-regulation)"
      - "No data on non-member insurer behaviour"

    voi_priorities:
      - "Enforcement effectiveness (high uncertainty, policy-relevant)"

---
# =============================================================================
# POLICY TIMELINE - AUSTRALIA
# =============================================================================

policy_timeline:
  jurisdiction: "Australia"

  key_events:
    - date: "2019-07-01"
      event: "FSC Moratorium commences"
      type: "Industry self-regulation"
      description: |
        Financial Services Council moratorium on use of genetic test results
        for life insurance products up to caps ($500k life, $200k TPD/trauma).

    - date: "2024-06-30"
      event: "FSC Moratorium expires"
      type: "Industry self-regulation"
      description: |
        Moratorium set to expire unless renewed.
        Parliamentary inquiry ongoing.

    - date: "2023-03-15"
      event: "Parliamentary Inquiry announced"
      type: "Legislative"
      description: |
        Joint Committee on Corporations and Financial Services inquiry into
        genetic discrimination and life insurance.

    - date: "2023-11-30"
      event: "Inquiry recommendations released"
      type: "Legislative"
      description: |
        Recommendations include legislated moratorium or strengthened FSC code.
        Government response pending.

  current_regime:
    type: "Industry moratorium (self-regulation)"
    start_date: "2019-07-01"
    end_date: "2024-06-30 (unless renewed)"
    caps:
      life_insurance: 500000  # AUD
      tpd: 200000  # AUD
      trauma: 200000  # AUD
      income_protection: null  # Not covered
    enforcement: "FSC complaints process"
    coverage: "FSC member insurers only"

  proposed_regimes:
    - name: "Legislated moratorium"
      status: "Under consideration"
      description: "Statutory ban on using genetic test results"
      enforcement: "AHRC complaints + penalties"

    - name: "Strengthened FSC code"
      status: "Industry proposal"
      description: "Enhanced self-regulation with independent review"
      enforcement: "FSC + independent adjudicator"

