  description: |
    Evidence on market structure, competition, and pass-through of
    genetic information costs/benefits.

  evidence_items:
    - evidence_id: "AU_market_001"
      parameter: "pass_through_rate"
      citation: "finkelstein_insurance_market_structure_2019"
      study_design: "Empirical analysis"
      jurisdiction: "United States"
      population: "Insurance markets"
      sample_size: null

      # Quality assessment
      initial_grade: "B"  # Empirical
      directness: "Indirect"  # US market
      precision: "Moderate"
      consistency: "Consistent"
      risk_of_bias: "Low"
      final_grade: "Moderate"

      # Effect estimate
      point_estimate: 0.75
      confidence_interval_lower: 0.60
      confidence_interval_upper: 0.90
      measure_type: "Pass-through of risk costs to consumers"

      # Prior conversion
      prior_distribution: "Beta"
      prior_alpha: 60
      prior_beta: 20
      prior_rationale: |
        Moderate quality evidence.
        High pass-through expected in competitive markets.

      notes: |
        AU market concentration may differ.
        Affects incidence of genetic information restrictions.

  # Synthesis for Module E
  synthesis:
    pass_through_rate:
      point: 0.75
      prior: "Beta(60, 20)"
      source: "finkelstein_insurance_market_structure_2019"

    evidence_gaps:
      - "No AU-specific pass-through estimates"
      - "Limited evidence on genetic information in pass-through"
      - "Market concentration effects uncertain"

    voi_priorities:
      - "Pass-through rate (moderate EVPPI expected)"

