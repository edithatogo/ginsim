# =============================================================================
# DATA ACCESS - AUSTRALIA
# =============================================================================

data_access:
  jurisdiction: "Australia"

  available_datasets:
    - dataset_id: "AU_testing_001"
      name: "Medicare Benefits Schedule (MBS) genetic testing data"
      custodian: "Department of Health and Aged Care"
      type: "Administrative"
      coverage: "All MBS-rebated genetic tests"
      time_period: "2015-present"
      access_conditions: "Research application required"
      limitations: "No clinical outcomes; limited demographics"

    - dataset_id: "AU_insurance_001"
      name: "APRA insurance statistics"
      custodian: "Australian Prudential Regulation Authority"
      type: "Aggregate"
      coverage: "Life insurance industry"
      time_period: "2010-present"
      access_conditions: "Public aggregate data"
      limitations: "No genetic-specific breakdowns"

    - dataset_id: "AU_clinical_001"
      name: "Australian Cancer Database"
      custodian: "Australian Institute of Health and Welfare"
      type: "Registry"
      coverage: "All cancer diagnoses"
      time_period: "1982-present"
      access_conditions: "Ethics + jurisdictional approval"
      limitations: "No genetic testing linkage"

  data_gaps:
    - "No linked genetic testing + insurance outcomes data"
    - "Limited patient-reported discrimination experiences"
    - "No prospective cohort on testing behaviour"
    - "Insurance claims data not accessible for research"

  data_linkage_opportunities:
    - "MBS + PBS + hospital data (via state linkages)"
    - "Cancer registry + genetic testing (research projects)"
    - "Survey linkage (e.g., 45 and Up Study)"

  governance_notes: |
    Genetic data highly sensitive under Privacy Act 1988 (Cth).
    Additional state/territory health privacy laws apply.
    Insurance data restricted under APRA confidentiality.
    Data linkage requires multi-jurisdictional approval.

