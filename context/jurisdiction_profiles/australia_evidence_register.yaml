# =============================================================================
# MODULE F: DATA QUALITY EXTERNALITY
# =============================================================================

module_f_data_quality:
  description: |
    Evidence on how genetic testing restrictions affect data quality
    for research and clinical purposes.

  evidence_items:
    - evidence_id: "AU_data_001"
      parameter: "research_participation_elasticity"
      citation: "blevins_genomic_data_bias_2020"
      study_design: "Cross-sectional analysis"
      jurisdiction: "International"
      population: "Genomic research participants"
      sample_size: 15000

      # Quality assessment
      initial_grade: "C"  # Cross-sectional
      directness: "Indirect"
      precision: "Precise"
      consistency: "Consistent"
      risk_of_bias: "Moderate"
      final_grade: "Low"

      # Effect estimate
      point_estimate: -0.10
      confidence_interval_lower: -0.15
      confidence_interval_upper: -0.05
      measure_type: "Reduction in research participation with privacy concerns"

      # Prior conversion
      prior_distribution: "Normal"
      prior_mean: -0.10
      prior_sd: 0.03
      prior_rationale: |
        Low quality evidence.
        Negative elasticity (concerns reduce participation).

      notes: |
        Data quality externality from testing restrictions.
        Affects long-term research benefits.

  # Synthesis for Module F
  synthesis:
    research_participation_elasticity:
      point: -0.10
      prior: "Normal(-0.10, 0.03)"
      source: "blevins_genomic_data_bias_2020"

    evidence_gaps:
      - "No AU data on research participation effects"
      - "Limited evidence on data quality impacts"
      - "Long-term effects uncertain"

    voi_priorities:
      - "Research participation elasticity (low-moderate EVPPI)"

