# =============================================================================
# POLICY TIMELINE - NEW ZEALAND
# =============================================================================

policy_timeline:
  jurisdiction: "New Zealand"
  
  key_events:
    - date: "2020-08-01"
      event: "Human Rights Commission Inquiry Report released"
      type: "Inquiry"
      description: |
        HRC report on genetic discrimination in insurance.
        Recommendations for legislative change.
    
    - date: "2021-02-15"
      event: "Government response to HRC inquiry"
      type: "Government"
      description: |
        Government noted existing Human Rights Act protections.
        No commitment to specific genetic discrimination legislation.
    
    - date: "2019-07-01"
      event: "FSC Australia moratorium commences"
      type: "Industry (cross-Tasman)"
      description: |
        Australian FSC moratorium affects NZ insurers with AU parent companies.
        NZ subsidiaries generally follow AU policy.
    
    - date: "2022-06-30"
      event: "NZ Insurance Council statement"
      type: "Industry"
      description: |
        NZ Insurance Council notes members follow AU moratorium for consistency.
        No separate NZ moratorium established.
  
  current_regime:
    type: "Human Rights Act (disability discrimination) + industry practice"
    legislation: "Human Rights Act 1993"
    grounds: "Disability (includes genetic predisposition)"
    enforcement: "Human Rights Commission complaints process"
    industry_practice: "Follows Australian FSC moratorium (informal)"
    caps:
      note: "No formal NZ caps; AU FSC caps applied by some insurers"
  
  proposed_regimes:
    - name: "Genetic discrimination-specific legislation"
      status: "Recommended by HRC (2020)"
      description: "Amend Human Rights Act to explicitly include genetic information"
      government_position: "Under consideration"
    
    - name: "Formal NZ moratorium"
      status: "Industry preference"
      description: "Adopt Australian FSC moratorium formally in NZ"
      industry_position: "Supported by Insurance Council"

