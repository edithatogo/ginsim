# New Zealand Evidence Register
# Evidence base for genetic discrimination policy modelling
# Last updated: 2026-03-03
# Track: gdpe_0002_evidence_anchoring - Phase 1

---
# =============================================================================
# MODULE A: BEHAVIOUR / DETERRENCE
# =============================================================================

module_a_behaviour_deterrence:
  description: |
    Evidence on how perceived or actual genetic discrimination affects
    decisions to undergo genetic testing in New Zealand.

  evidence_items:
    - evidence_id: "NZ_behav_001"
      parameter: "testing_uptake_elasticity"
      citation: "mcguire_perceived_discrimination_testing_2019"
      study_design: "Cross-sectional survey"
      jurisdiction: "United States"
      population: "Adults considering predictive genetic testing (n=1,250)"
      sample_size: 1250
      
      # Quality assessment (GRADE-adapted)
      initial_grade: "D"  # Cross-sectional
      directness: "Very Indirect"  # US, not NZ; different health system
      precision: "Moderate"
      consistency: "Consistent"
      risk_of_bias: "Moderate"
      final_grade: "Very Low"
      
      # Effect estimate (same as AU but lower confidence)
      point_estimate: 0.18
      confidence_interval_lower: 0.08
      confidence_interval_upper: 0.35
      measure_type: "Proportion avoiding testing due to insurance concerns"
      
      # Prior conversion
      prior_distribution: "Beta"
      prior_alpha: 18
      prior_beta: 82
      prior_rationale: |
        Very low quality for NZ context.
        US data may not generalize to NZ with different insurance structure.
        Wider variance than AU to reflect greater uncertainty.
      
      notes: |
        No NZ-specific evidence available.
        ACC scheme may reduce insurance concerns vs AU.
        Private life insurance market smaller than AU.

    - evidence_id: "NZ_behav_002"
      parameter: "deterrence_effect_nz"
      citation: "hrc_nz_genetic_discrimination_2020"
      study_design: "Inquiry report with submissions"
      jurisdiction: "New Zealand"
      population: "NZ adults with genetic conditions"
      sample_size: 78  # Submissions received
      
      # Quality assessment
      initial_grade: "E"  # Inquiry submissions
      directness: "Direct"  # NZ context
      precision: "Low"  # Qualitative data
      consistency: "Consistent"  # Aligns with international
      risk_of_bias: "High"  # Self-selected submissions
      final_grade: "Very Low"
      
      # Effect estimate (qualitative converted)
      point_estimate: 0.12
      confidence_interval_lower: 0.05
      confidence_interval_upper: 0.25
      measure_type: "Estimated proportion reporting insurance concerns"
      
      # Prior conversion
      prior_distribution: "Beta"
      prior_alpha: 10
      prior_beta: 73
      prior_rationale: |
        Very low quality evidence.
        Direct NZ context but qualitative and self-selected.
      
      notes: |
        Key NZ evidence source.
        Human Rights Commission inquiry (2020).
        Qualitative findings; quantitative conversion uncertain.

  # Synthesis for Module A
  synthesis:
    baseline_testing_uptake:
      point: 0.52
      prior: "Beta(462, 426)"
      source: "ettema_genetic_testing_uptake_2021 (extrapolated)"
    
    deterrence_elasticity:
      point: 0.12
      prior: "Beta(18, 82)"
      source: "mcguire_perceived_discrimination_testing_2019 (adapted)"
    
    nz_specific_effect:
      point: 0.12
      prior: "Beta(10, 73)"
      source: "hrc_nz_genetic_discrimination_2020"
    
    evidence_gaps:
      - "No NZ quantitative studies on testing behaviour"
      - "No discrete choice experiments for NZ population"
      - "Limited evidence on Māori and Pacific perspectives"
      - "ACC scheme impact on deterrence unknown"
      - "Private insurance market dynamics differ from AU"
    
    voi_priorities:
      - "Testing uptake elasticity (very high EVPPI expected for NZ)"
      - "Cultural differences in testing decisions"
      - "ACC vs private insurance trade-offs"

---
# =============================================================================
# MODULE C: INSURANCE EQUILIBRIUM
# =============================================================================

module_c_insurance_equilibrium:
  description: |
    Evidence on adverse selection and premium impacts in NZ insurance market.

  evidence_items:
    - evidence_id: "NZ_ins_001"
      parameter: "adverse_selection_elasticity"
      citation: "hersch_viscusi_insurance_discrimination_2019"
      study_design: "Economic modelling"
      jurisdiction: "United States"
      population: "Theoretical insurance market"
      
      # Quality assessment
      initial_grade: "E"
      directness: "Very Indirect"  # US model, NZ market different
      precision: "Moderate"
      consistency: "Consistent"
      risk_of_bias: "Moderate"
      final_grade: "Very Low"
      
      # Effect estimate
      point_estimate: 0.06
      confidence_interval_lower: 0.02
      confidence_interval_upper: 0.12
      measure_type: "Premium increase per 10% increase in informed high-risks"
      
      # Prior conversion
      prior_distribution: "Normal"
      prior_mean: 0.06
      prior_sd: 0.04
      prior_rationale: |
        Very low quality for NZ.
        Smaller market may have different dynamics.
      
      notes: |
        NZ life insurance market smaller and more concentrated.
        May have different adverse selection dynamics.

    - evidence_id: "NZ_ins_002"
      parameter: "market_concentration_nz"
      citation: "hrc_nz_genetic_discrimination_2020"
      study_design: "Industry analysis"
      jurisdiction: "New Zealand"
      population: "NZ life insurance market"
      
      # Quality assessment
      initial_grade: "E"
      directness: "Direct"
      precision: "Low"
      consistency: "Unknown"
      risk_of_bias: "Moderate"
      final_grade: "Very Low"
      
      # Market structure
      top_4_share: 0.75
      number_of_insurers: 12
      foreign_owned_share: 0.85
      
      notes: |
        Highly concentrated market.
        Most insurers Australian-owned.
        May follow AU policy decisions.

  # Synthesis for Module C
  synthesis:
    adverse_selection_elasticity:
      point: 0.06
      prior: "Normal(0.06, 0.04) truncated [0, ∞)"
      source: "hersch_viscusi_insurance_discrimination_2019 (adapted)"
    
    market_concentration:
      top_4_share: 0.75
      source: "hrc_nz_genetic_discrimination_2020"
    
    evidence_gaps:
      - "No NZ empirical data on adverse selection"
      - "Market concentration effects unknown"
      - "Cross-Tasman insurer behaviour uncertain"
    
    voi_priorities:
      - "Adverse selection elasticity (high EVPPI)"
      - "Market structure effects"

