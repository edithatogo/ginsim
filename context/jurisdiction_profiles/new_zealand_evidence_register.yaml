# =============================================================================
# NZ-SPECIFIC CONSIDERATIONS
# =============================================================================

nz_specific_considerations:
  
  health_system_differences:
    - "ACC covers injury-related disability (not genetic conditions)"
    - "Public health system provides genetic testing (limited private market)"
    - "Smaller private life insurance market vs Australia"
    - "Pharmac influences medicine access (not directly relevant)"
  
  cultural_considerations:
    - "Whakapapa (genealogy) has cultural significance beyond genetics"
    - "Māori perspectives on genetic information may differ"
    - "Collective vs individual decision-making in some communities"
    - "Historical research exploitation creates trust issues"
  
  market_differences:
    - "Life insurance penetration lower than Australia"
    - "Most insurers are Australian-owned subsidiaries"
    - "Policy tends to follow Australian developments"
    - "Smaller market = less data for analysis"
  
  regulatory_differences:
    - "No genetic discrimination-specific legislation"
    - "Human Rights Act covers disability (includes genetic)"
    - "Health and Disability Commissioner has limited jurisdiction"
    - "Privacy Act 2020 includes genetic information"

