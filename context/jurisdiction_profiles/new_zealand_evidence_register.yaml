# =============================================================================
# DATA ACCESS - NEW ZEALAND
# =============================================================================

data_access:
  jurisdiction: "New Zealand"
  
  available_datasets:
    - dataset_id: "NZ_testing_001"
      name: "National Genetic Testing Database"
      custodian: "National Health Board / Lablink"
      type: "Administrative"
      coverage: "Publicly funded genetic tests"
      time_period: "2010-present"
      access_conditions: "Research application to NHB"
      limitations: "Private testing not captured; limited clinical data"
    
    - dataset_id: "NZ_insurance_001"
      name: "Prudential insurance statistics"
      custodian: "Reserve Bank of New Zealand"
      type: "Aggregate"
      coverage: "Life insurance industry"
      time_period: "2015-present"
      access_conditions: "Public aggregate data"
      limitations: "No genetic-specific breakdowns"
    
    - dataset_id: "NZ_clinical_001"
      name: "New Zealand Cancer Registry"
      custodian: "Ministry of Health"
      type: "Registry"
      coverage: "All cancer diagnoses"
      time_period: "1994-present"
      access_conditions: "Health Quality & Safety Commission approval"
      limitations: "No genetic testing linkage"
    
    - dataset_id: "NZ_survey_001"
      name: "New Zealand Health Survey"
      custodian: "Ministry of Health"
      type: "Survey"
      coverage: "Nationally representative"
      time_period: "Annual"
      access_conditions: "Statistics NZ DataLab"
      limitations: "No genetic testing questions"
  
  data_gaps:
    - "No linked genetic testing + insurance data"
    - "No patient-reported discrimination data"
    - "Limited Māori health data sovereignty frameworks applied"
    - "Private genetic testing not captured"
  
  data_linkage_opportunities:
    - "IDM (Integrated Data Infrastructure) linkage possible"
    - "Cancer registry + genetic testing (research projects)"
    - "Survey linkage (e.g., SoFIE, GSOA)"
  
  governance_notes: |
    Health Information Privacy Code 2020 applies.
    Māori Data Sovereignty principles (Te Mana Raraunga) increasingly important.
    Privacy Act 2020 governs personal information.
    IDM access requires Statistics NZ approval.
    Genetic information considered highly sensitive.
  
  maori_data_sovereignty:
    principles: "Te Mana Raraunga - Māori Data Sovereignty Network"
    key_principles:
      - "Māori have an inherent right to control Māori data"
      - "Data about Māori should be used for Māori benefit"
      - "Māori governance over data collection and use"
    implications: |
      Research involving Māori genetic data requires:
      - Māori governance involvement
      - Clear benefit to Māori
      - Adherence to tikanga (Māori protocols)
      - Partnership with iwi/Māori organizations

