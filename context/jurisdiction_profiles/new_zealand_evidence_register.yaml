# =============================================================================
# MODULES D-F (Abbreviated - Similar to AU with NZ Adaptations)
# =============================================================================

module_d_proxy_substitution:
  synthesis:
    family_history_sensitivity:
      point: 0.68
      prior: "Beta(357, 168)"
      source: "tabor_family_history_proxy_2018 (extrapolated)"
    
    proxy_substitution_rate:
      point: 0.40
      prior: "Beta(20, 30)"
      source: "lowenstein_genetic_discrimination_insurance_2021"
    
    notes: "No NZ-specific evidence; use AU priors with wider variance"

module_e_pass_through:
  synthesis:
    pass_through_rate:
      point: 0.70
      prior: "Beta(50, 21)"
      source: "finkelstein_insurance_market_structure_2019 (adapted)"
    
    notes: |
      Higher concentration may reduce pass-through.
      Limited NZ evidence.

module_f_data_quality:
  synthesis:
    research_participation_elasticity:
      point: -0.10
      prior: "Normal(-0.10, 0.04)"
      source: "blevins_genomic_data_bias_2020 (adapted)"
    
    notes: |
      NZ genomics research infrastructure smaller.
      Potential for greater impact from participation changes.

