# =============================================================================
# ENFORCEMENT AND COMPLIANCE
# =============================================================================

enforcement_compliance:
  description: |
    Evidence on enforcement mechanisms for genetic discrimination in NZ.

  evidence_items:
    - evidence_id: "NZ_enf_001"
      parameter: "enforcement_effectiveness"
      citation: "hrc_nz_genetic_discrimination_2020"
      study_design: "Inquiry report"
      jurisdiction: "New Zealand"
      
      # Quality assessment
      initial_grade: "E"
      directness: "Direct"
      precision: "Low"
      risk_of_bias: "Moderate"
      final_grade: "Very Low"
      
      # Current regime assessment
      current_mechanism: "Human Rights Act complaints"
      complaints_per_year: 2  # Approximate from inquiry
      successful_resolutions: 1  # Approximate
      
      notes: |
        No specific genetic discrimination legislation.
        General disability discrimination provisions apply.
        Low complaint numbers may reflect under-reporting.

  synthesis:
    enforcement_mechanism: "Human Rights Act 1993 (disability grounds)"
    complaints_annual: 2
    enforcement_effectiveness:
      point: 0.40
      prior: "Beta(8, 12)"
      source: "hrc_nz_genetic_discrimination_2020"
    
    evidence_gaps:
      - "No genetic discrimination-specific legislation"
      - "Complaint numbers very low (under-reporting likely)"
      - "No data on resolution outcomes"
      - "Awareness of rights uncertain"

