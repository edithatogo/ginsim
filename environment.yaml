name: genetic-discrimination-policy-econ
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip>=23.0
  
  # Core numerical
  - jax>=0.4.25
  - jaxlib>=0.4.25
  - numpy>=1.26
  - polars>=0.20.0
  
  # Probabilistic programming
  - numpyro>=0.15.0
  
  # Optimization
  - optax>=0.2.2
  - jaxopt>=0.8.3
  
  # Config management
  - pyyaml>=6.0
  - pydantic>=2.6
  - hydra-core>=1.3
  
  # Game theory / economics
  - nashpy>=0.0.32
  - quantecon>=0.8.0
  - networkx>=3.0
  
  # CLI and output
  - typer>=0.9.0
  - rich>=13.7.0
  - tqdm>=4.66.0
  
  # Visualization
  - matplotlib>=3.8
  - seaborn>=0.13
  
  # Reporting
  - python-docx>=1.1
  - reportlab>=4.0
  - tabulate>=0.9
  
  # Workflow
  - snakemake>=8.0
  - dvc>=3.0
  
  # Testing
  - pytest>=8.0
  - pytest-cov>=4.0
  - pytest-xdist>=3.5
  - pytest-mock>=3.12
  - pytest-timeout>=2.2
  - hypothesis>=6.97
  - mutmut>=2.4
  
  # Code quality
  - ruff>=0.3.0
  - pyright>=1.1.350
  - pre-commit>=3.6
  
  # Profiling (SOTA)
  - py-spy>=0.3.14
  - pyinstrument>=4.6
  - scalene>=1.5.40
  - line_profiler>=4.1
  - memray>=1.11
  - snakeviz>=2.2.0
  
  # Coverage
  - coverage>=7.4
  - coverage-badge>=1.1
  - diff-cover>=8.0
  
  # Jupyter (optional)
  - jupyterlab>=4.0
  - ipykernel>=6.0
  - ipython>=8.20
  
  - pip:
    - -e .
    - uv>=0.1.0
    - speedscope>=0.0.1
    - covdefaults>=2.3
    - tracemalloc-debug>=0.1
