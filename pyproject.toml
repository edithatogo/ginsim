[project]
name = "genetic-discrimination-policy-econ"
version = "0.1.0"
description = "JAX-first scaffold for integrated economic evaluation of genetic discrimination policy options"
requires-python = ">=3.10"
dependencies = [
  "matplotlib>=3.8",
  "tabulate>=0.9",
  "python-docx>=1.1",
  "reportlab>=4.0",
  "numpy>=1.26",
  "pandas>=2.2",
  "pyyaml>=6.0",
  "pydantic>=2.6",
  "jax>=0.4.25",
  "jaxlib>=0.4.25",
  "numpyro>=0.15.0",
  "blackjax>=1.1.0",
  "optax>=0.2.2",
  "jaxopt>=0.8.3",
  "distrax>=0.1.5",
  "equinox>=0.11.3",
  "chex>=0.1.86",
  "jaxtyping>=0.2.25",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.3.0",
]

validation = [
  "bibtex-tidy>=1.0",
  "bibtexparser>=1.4",
  "requests>=2.31",
  "habanero>=1.2",  # CrossRef API access
]

[tool.ruff]
line-length = 100
